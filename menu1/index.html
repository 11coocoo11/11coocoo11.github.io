<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 확인</title>
    <style>
        /* 배경 및 전체 레이아웃 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('배경이미지_주소.jpg') no-repeat center center/cover; /* 배경 이미지 적용 시 */
            background-color: #333; /* 기본 배경색 */
            font-family: sans-serif;
        }
        /* 중앙 검은색 팝업창 */
        .lock-container {
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { font-size: 20px; margin-bottom: 10px; word-break: keep-all; }
        p { font-size: 13px; color: #ccc; margin-bottom: 20px; line-height: 1.5; }
        /* 입력창 */
        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
        }
        /* 확인 버튼 */
        button {
            width: 100%;
            padding: 15px;
            background-color: #ff4d4d; /* 이미지와 유사한 붉은 톤 */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background-color: #e60000; }
    </style>
</head>
<body>

<div class="lock-container">
    <h2>관세청
    <p>비밀번호를 입력하여 접속하세요.<br>*네이버 플레이스 예약창 요청사항에 본인의 소속과 비밀번호를 적어주세요*</p>
    
    <input type="password" id="passwordInput" placeholder="비밀번호 입력">
    <button onclick="checkPassword()">확인</button>
</div>

<script>
    function checkPassword() {
        const password = document.getElementById('passwordInput').value;
        
        if (password === '0125') { 
            // 비밀번호가 맞을 때 이동할 진짜 페이지 주소
            window.location.href = 'https://map.naver.com/p/search/%EC%84%B8%EC%83%81%EC%97%90%ED%95%98%EB%82%98%EB%BF%90%EC%9D%B8%EC%B9%98%EA%B3%BC/place/34347279?placePath=%3FabtExp%3DNEW-PLACE-SEARCH%253A6%26bk_query%3D%25EC%2584%25B8%25EC%2583%2581%25EC%2597%2590%25ED%2595%2598%25EB%2582%2598%25EB%25BF%2590%25EC%259D%25B8%25EC%25B9%2598%25EA%25B3%25BC%26entry%3Dpll%26from%3Dnx%26fromNxList%3Dtrue&placeSearchOption=abtExp%3DNEW-PLACE-SEARCH%253A6%26bk_query%3D%25EC%2584%25B8%25EC%2583%2581%25EC%2597%2590%25ED%2595%2598%25EB%2582%2598%25EB%25BF%2590%25EC%259D%25B8%25EC%25B9%2598%25EA%25B3%25BC%26entry%3Dpll%26fromNxList%3Dtrue%26originalQuery%3D%25EC%2584%25B8%25EC%2583%2581%25EC%2597%2590%25ED%2595%2598%25EB%2582%2598%25EB%25BF%2590%25EC%259D%25B8%25EC%25B9%2598%25EA%25B3%25BC%26x%3D127.383585%26y%3D36.353850&searchType=place'; 
        } else {
            alert('비밀번호가 올바르지 않습니다.');
        }
    }
</script>

</body>
</html>
